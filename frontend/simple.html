<!DOCTYPE html>
<html>
<head>
    <title>Salzburg WebGIS - Simple Test</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 600px; }
        .controls { position: absolute; top: 10px; right: 10px; z-index: 1000; }
        .controls button { margin: 5px; padding: 10px; background: white; border: 1px solid #ccc; cursor: pointer; }
        .info { position: absolute; bottom: 10px; left: 10px; background: white; padding: 10px; z-index: 1000; }
    </style>
</head>
<body>
    <h1>Salzburg WebGIS - Simple Test</h1>
    <div id="map"></div>
    
    <div class="controls">
        <button onclick="zoomIn()">➕ Zoom In</button>
        <button onclick="zoomOut()">➖ Zoom Out</button>
        <button onclick="locate()">📍 My Location</button>
    </div>
    
    <div class="info" id="info">
        Click on map to see coordinates
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Simple map
        const map = L.map('map').setView([47.8095, 13.0550], 13);
        
        // Basemap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: 'OpenStreetMap'
        }).addTo(map);
        
        // Add some REAL Salzburg landmarks
        const landmarks = [
            {name: "Salzburg Cathedral", lat: 47.798, lng: 13.047, type: "church"},
            {name: "Mozart's Birthplace", lat: 47.800, lng: 13.044, type: "museum"},
            {name: "Mirabell Palace", lat: 47.806, lng: 13.042, type: "palace"},
            {name: "Salzburg Hauptbahnhof", lat: 47.813, lng: 13.045, type: "station"},
            {name: "Kapuzinerberg", lat: 47.807, lng: 13.057, type: "park"},
            {name: "Salzach River", lat: 47.801, lng: 13.048, type: "river"},
            {name: "University", lat: 47.795, lng: 13.048, type: "school"},
            {name: "Festival Hall", lat: 47.798, lng: 13.042, type: "theatre"}
        ];
        
        // Add markers with different colors
        landmarks.forEach(l => {
            let color = "#FF4444"; // red default
            if (l.type === "park") color = "#33CC33";
            else if (l.type === "river") color = "#3366FF";
            else if (l.type === "museum" || l.type === "palace") color = "#FF9933";
            else if (l.type === "school") color = "#9933FF";
            
            L.circleMarker([l.lat, l.lng], {
                radius: 8,
                color: color,
                fillColor: color,
                fillOpacity: 0.8
            }).bindPopup(`<b>${l.name}</b><br>Type: ${l.type}`).addTo(map);
        });
        
        // Show coordinates on click
        map.on('click', function(e) {
            document.getElementById('info').innerHTML = 
                `Lat: ${e.latlng.lat.toFixed(4)}°, Lng: ${e.latlng.lng.toFixed(4)}°`;
        });
        
        // Control functions
        function zoomIn() { map.zoomIn(); }
        function zoomOut() { map.zoomOut(); }
        function locate() { 
            map.locate({setView: true, maxZoom: 16});
            map.on('locationfound', function(e) {
                L.marker(e.latlng).addTo(map).bindPopup("You are here").openPopup();
            });
        }
        
        console.log("✅ Simple map loaded with 8 landmarks");
    </script>
</body>
</html>
