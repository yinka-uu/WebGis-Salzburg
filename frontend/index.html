<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salzburg WebGIS - Urban Management Platform</title>

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Header -->
      <header>
        <div class="logo">
          <i class="fas fa-map-marked-alt"></i>
          <h1>Salzburg <span>WebGIS</span></h1>
        </div>
        <nav>
          <button class="nav-btn active" onclick="showTool('map')">
            <i class="fas fa-map"></i> <span>Map</span>
          </button>
          <button class="nav-btn" onclick="showTool('layers')">
            <i class="fas fa-layer-group"></i> <span>Layers</span>
          </button>
          <button class="nav-btn" onclick="showTool('analysis')">
            <i class="fas fa-chart-line"></i> <span>Analysis</span>
          </button>
          <button class="nav-btn" onclick="showTool('query')">
            <i class="fas fa-search"></i> <span>Query</span>
          </button>
          <button class="nav-btn" onclick="showTool('about')">
            <i class="fas fa-info-circle"></i> <span>About</span>
          </button>
        </nav>
      </header>

      <!-- Main Container -->
      <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
          <div class="sidebar-header">
            <h2>
              <i class="fas fa-tools"></i>
              <span id="tool-title">🗺️ Map Tools</span>
            </h2>
            <button onclick="toggleSidebar()">
              <i class="fas fa-times"></i>
            </button>
          </div>
          <div class="sidebar-content" id="sidebarContent">
            <!-- Content loaded dynamically -->
            <div class="spinner"></div>
            <p style="text-align: center">Loading tools...</p>
          </div>
        </aside>

        <!-- Map Container -->
        <div class="map-container">
          <div id="map"></div>

          <!-- Map Controls -->
          <div class="map-controls">
            <button id="zoomIn" class="control-btn" title="Zoom In">
              <i class="fas fa-plus"></i>
            </button>
            <button id="zoomOut" class="control-btn" title="Zoom Out">
              <i class="fas fa-minus"></i>
            </button>
            <button id="fullscreen" class="control-btn" title="Fullscreen">
              <i class="fas fa-expand"></i>
            </button>
            <button id="locateMe" class="control-btn" title="Find my location">
              <i class="fas fa-crosshairs"></i>
            </button>
          </div>

          <!-- Coordinates Display -->
          <div class="coordinates" id="coordinates">Loading map...</div>
        </div>
      </div>

      <!-- Legend -->
      <div class="legend" id="legend">
        <h3><i class="fas fa-palette"></i> Map Legend</h3>
        <div class="legend-items">
          <div class="legend-item">
            <span class="legend-color" style="background: #ff4444"></span>
            <span>Religious Buildings</span>
          </div>
          <div class="legend-item">
            <span class="legend-color" style="background: #ff9933"></span>
            <span>Museums & Culture</span>
          </div>
          <div class="legend-item">
            <span class="legend-color" style="background: #ff66b2"></span>
            <span>Palaces & Castles</span>
          </div>
          <div class="legend-item">
            <span class="legend-color" style="background: #33cc33"></span>
            <span>Parks & Gardens</span>
          </div>
          <div class="legend-item">
            <span class="legend-color" style="background: #3366ff"></span>
            <span>Water Features</span>
          </div>
          <div class="legend-item">
            <span class="legend-color" style="background: #666666"></span>
            <span>Transportation</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Main Application -->
    <script src="js/salzburg-webgis.js"></script>
  </body>
</html>
